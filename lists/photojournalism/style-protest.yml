---
title: Style protest
category: photojournalism
---
action photography: capturing the movement and energy of the protesters in action
aerial photography: providing a unique and expansive view of the protests and the surrounding environment
anamorphic photography: capturing the expansive scale and theatrical drama of the protest with cinematic lens flares
artistic photojournalism: using creative techniques and visual storytelling to convey the mood and emotions of the protests
black and white photography: creating a timeless and classic aesthetic that emphasizes contrast and emotion
bokeh-focused photography: isolating key individual faces of protesters against a beautifully blurred background of the marching crowd
candid photography: capturing the spontaneous moments of protests and the raw emotions of the participants
chiaroscuro photography: utilizing strong contrasts between shadow and light to give the protesters a dramatic, painting-like appearance
close-up photography: capturing the detailed textures of handmade cardboard protest signs and emotional facial expressions
color photography: capturing the vibrancy and energy of protests using bold and vivid colors
creative lighting photography: using creative lighting techniques to add drama and impact to protest images
documentary photography: providing a historical record of the protests and the people involved
dutch angle photography: tilting the camera to convey a sense of unease, tension, and dynamic energy within the crowd
environmental portraiture: taking portraits of the protesters and the people affected by the issues being addressed
fisheye photography: capturing an ultra-wide, distorted perspective that shows the massive density of protesters in narrow city streets
forced perspective photography: composing shots to emphasize the scale relationship between individual protesters and looming government buildings
golden hour photography: using the warm, soft light of the late afternoon sun to evoke hope and solidarity among the marching crowds
high-contrast photography: emphasizing the stark contrasts between light and dark to create a bold and impactful image
high-speed photography: using fast shutter speeds to capture fast-paced action and movement
infrared photography: capturing the protest in an otherworldly, thermal-like spectrum to highlight the collective body heat of the crowd
long exposure photography: using slow shutter speeds to capture movement and blur
low-angle photography: shooting from the ground up to make the protesters appear powerful, heroic, and larger than life
low-light photography: capturing the mood and atmosphere of protests that occur at night or in low light conditions
macro photography: focusing on the small details of protests and individual participants
monochrome portraiture: stripping away distracting colors to focus purely on the raw, emotional expressions of individual demonstrators
motion blur photography: using a slightly slower shutter speed to convey the frantic movement and chaotic energy of a dispersing crowd
multi-media storytelling: using a combination of photography, video, and audio to tell a powerful and impactful story about the protests and the issues they address
night-vision photography: documenting late-night demonstrations and clashes using green-hued or thermal imaging for a gritty, tactical aesthetic
oblique lighting photography: utilizing side light from streetlamps or headlights to cast long shadows and highlight the textures of the street
panning photography: tracking a moving protester or vehicle while blurring the background to create a strong sensation of speed and momentum
panoramic photography: capturing the scale and size of large-scale protests and demonstrations
photojournalistic essay: using a series of photographs to tell a story about the protests and the issues they are addressing
retro photography: using vintage or outdated equipment to create a unique and stylized look
silhouetted photography: positioning protesters against a bright light source, like a sunset or a fire, to create striking dark profiles
snapshots: capturing the small, intimate moments of protests that might be overlooked by other forms of photojournalism
street photography: capturing the atmosphere of the protests and the surrounding environment
telephoto portraiture: capturing intimate, unposed expressions of key figures in the crowd from a safe and respectful distance
wide-angle photography: capturing the massive scale of the demonstration along with the surrounding urban landscape to show context
